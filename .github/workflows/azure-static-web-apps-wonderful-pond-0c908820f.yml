name: Deploy Frontend (SWA) + Backend (App Service)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-all
  cancel-in-progress: false

jobs:
  # -------------------------- FRONTEND (React -> SWA) --------------------------
  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: My_App/frontend/package-lock.json

      - name: Install deps & build (CRA uses .env.production automatically)
        working-directory: My_App/frontend
        run: |
          npm ci
          CI=false npm run build

      # ⬇️ Upload the already-built assets; don't let the action rebuild with Oryx
      - name: Deploy to Azure Static Web Apps (upload prebuilt)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          # Some releases expect 'deployment_action', some accept 'action'
          deployment_action: upload
          action: upload
          skip_app_build: true
          app_location: My_App/frontend
          app_artifact_location: My_App/frontend/build
          production_branch: main

  # --------------------------- BACKEND (Flask -> App Service) ---------------------------
  backend:
    runs-on: ubuntu-latest
    needs: frontend   # remove if you want independent deploys
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2A66DF7ACB594937BBFF43E6BB6E3376 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6F4AD8E7077C4CE2B5B8F4E7EB2CC8C4 }}
          subscription-id: ${{ secretsA ZUREAPPSERVICE_SUBSCRIPTIONID_8B5E3BBA930A4D3AA14787A960622DA8 }}

      # Deploy the My_App folder so App Service sees requirements.txt at My_App/ and code at My_App/backend
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: AI-Powered-Forecaster
          slot-name: Production
          package: My_App
          # Optional but recommended to keep startup consistent each deploy:
          # startup-command: gunicorn --chdir /home/site/wwwroot/backend run:app --bind 0.0.0.0:8000 --timeout 600 --access-logfile - --error-logfile - --log-level info
