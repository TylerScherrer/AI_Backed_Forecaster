name: Deploy Frontend (SWA) + Backend (App Service)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/Tag/SHA to deploy"
        required: true
        default: "main"

concurrency:
  group: deploy-all
  cancel-in-progress: false

jobs:
  # -------------------------- FRONTEND (React -> SWA) --------------------------
  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Push runs use the exact commit; manual runs use the chosen ref
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: My_App/frontend/package-lock.json

      - name: Install deps & build
        working-directory: My_App/frontend
        run: |
          npm ci
          CI=false npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: upload
          app_location: My_App/frontend
          output_location: build
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}

  # --------------------------- BACKEND (Flask -> App Service) ---------------------------
  backend:
    runs-on: ubuntu-latest
    needs: frontend
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Match the frontend ref (push SHA or manual input)
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2A66DF7ACB594937BBFF43E6BB6E3376 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6F4AD8E7077C4CE2B5B8F4E7EB2CC8C4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8B5E3BBA930A4D3AA14787A960622DA8 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: AI-Powered-Forecaster
          slot-name: Production
          package: My_App
          # Stable startup (no fragile --pythonpath); matches your repo layout:
          #   My_App/
          #     backend/run.py  -> exposes `app`
          #     requirements.txt (at My_App/)
          startup-command: >
            gunicorn --chdir /home/site/wwwroot backend.run:app
            --bind 0.0.0.0:$PORT --timeout 600
            --access-logfile - --error-logfile - --log-level info
